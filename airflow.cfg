# Airflow configuration file
# For local development and testing

[core]
# The home folder for airflow, default is ~/airflow
airflow_home = /Users/ssingh14/Downloads/XYZ_DEMO_CHECK/appgithubaction/airflow_home

# The executor class that airflow should use
executor = SequentialExecutor

# The SqlAlchemy connection string to the metadata database
# Airflow supports most of the major DBMS that SqlAlchemy supports, such as MySQL, PostgreSQL, Oracle, MS SQL Server, SQLite
sql_alchemy_conn = sqlite:////Users/ssingh14/Downloads/XYZ_DEMO_CHECK/appgithubaction/airflow_home/airflow.db

# For development, we'll use SQLite which is the default and requires no additional setup
# For production, use PostgreSQL: postgresql://user:password@localhost/airflow

# The encoding for the logs
log_file_path = /Users/ssingh14/Downloads/XYZ_DEMO_CHECK/appgithubaction/airflow_home/logs

# Logging level
logging_level = INFO

# Logging config file
# log_config_file = log_config.yaml

# The folder where airflow stores the logs for each task
base_log_folder = /Users/ssingh14/Downloads/XYZ_DEMO_CHECK/appgithubaction/airflow_home/logs

# Airflow can store logs remotely in AWS S3, Google Cloud Storage or Elastic Search
remote_logging = False

# The task execution timeout in seconds
task_concurrency = 16

# The number of times to retry each task before failing
max_tries = 2

# How many DAGs to load in parallel
parallelism = 32

# The number of task slots available per worker
# In local executor, set it to the number of cores available
max_active_runs_per_dag = 16

# The folder where airflow plugins are stored
plugins_folder = /Users/ssingh14/Downloads/XYZ_DEMO_CHECK/appgithubaction/plugins

# Security & Authentication
[security]
# Set to true to enable unit test mode, which disables the dependency checks
unit_test_mode = False

[webserver]
# The port on which to run the web server
web_server_port = 8080

# The base_log_folder for the webserver
base_log_folder = /Users/ssingh14/Downloads/XYZ_DEMO_CHECK/appgithubaction/airflow_home/logs

# The ip specified when starting the web server
web_server_host = 0.0.0.0

# Whether the webserver should expose the config file in the web UI
expose_config = True

# Default view in web UI
dag_default_view = tree

# Whether to load the example DAGs
load_examples = False

[scheduler]
# The scheduler heartbeat in seconds
scheduler_heartbeat_interval = 5

# How often (in seconds) to scan the DAG directory for new files
dag_dir_list_interval = 300

# How many seconds to wait between retries when heart-beating fails
scheduler_failed_slas_refresh_interval = 600

[database]
# The SqlAlchemy pool size is the maximum number of database connections in the pool
sqlalchemy_pool_size = 5

# The SqlAlchemy pool recycle is the number of seconds a connection is allowed to be idle in the pool before it is reclaimed
sqlalchemy_pool_recycle = 3600

[email]
# Email backend
email_backend = airflow.providers.smtp.utils.smtp_provider_override.smtp_provider

[smtp]
# If you want airflow to send emails on retries, failure, and you want to use the SMTP notifier
# you have to configure an smtp server here
smtp_host = smtp.gmail.com
smtp_starttls = True
smtp_ssl = False
smtp_user = your_email@gmail.com
smtp_password = your_app_password
smtp_port = 587
smtp_mail_from = airflow@example.com
